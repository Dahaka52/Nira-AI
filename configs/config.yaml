# Enabled operations
stt_active_id: "sherpa_ru"  # Быстрое переключение STT: выбери id и вызови /api/operations/reload
stt_strict_active_id: true  # Ошибка старта, если выбранный stt_active_id отсутствует в operations
broadcast_debug_prompt_events: false  # Служебные raw prompt/history события в WS (держать false для меньшей нагрузки)

operations:
  # STT (Speech-to-Text): текущий рабочий модуль — sherpa.
  - role: stt
    id: sherpa_ru
    entrypoint: "utils.operations.stt.sherpa:SherpaSTT"
    ws_url: "ws://127.0.0.1:6106"
    provider: "cpu"   # cpu | cuda
    language: "ru"
    normalize_output: true
    process_autostart: true
    process_startup_retries: 3
    process_startup_backoff_s: 0.6
    process:
      type: "sherpa_onnx_server"
      preset: "balanced" # low_latency | balanced | noisy_room
      port: 6106
      provider: "cpu"    # cpu | cuda
      gpu_id: 1          # используется если provider=cuda (RTX 5060 = 1)
      model_dir: "C:\\Nirmita\\models\\vosk-model-small-streaming-ru"
      model_variant: "fp32"   # int8 | fp32 | chunk64
      decoding_method: "modified_beam_search"
      num_active_paths: 6
      use_endpoint: 0
      hotwords_file: "C:\\Nirmita\\models\\hotwords.txt"
      hotwords_score: 3.5

  # T2T (Text-to-Text) - Используем внешний llama-server
  - role: t2t
    id: llamacpp
    max_length: 500
    temperature: 0.7
    top_p: 0.95
    top_k: 40
    stream: true

  # Запасной вариант (прямая библиотека)
  # - role: t2t
  #   id: llamacpp_python
  #   model_path: "C:\\Nirmita\\models\\Mistral-Nemo-Instruct-2407-absolute-heresy.i1-Q4_K_M.gguf"
  #   n_ctx: 4096
  #   n_gpu_layers: 99
  #   max_tokens: 500
  #   temperature: 0.7
  #   cache_type_k: "q8_0" 
  #   cache_type_v: "q8_0"
  #   gpu_id: 0

  # Text filters
  - role: filter_text
    id: filter_clean
  - role: filter_text
    id: chunker_sentence

# Microphone & VAD Settings
microphone:
  enabled: true
  source_id: "mic"             # Сквозной идентификатор источника аудио
  device_name: "Fifine"         # Основной выбор по имени устройства (устойчив к смене ID)
  device_hostapi: "WASAPI"    # Опционально: фильтр по hostapi для точного совпадения
  device_index: 7               # Fallback, если по имени устройство не найдено
  vad_threshold: 0.06           # Ниже порог: тише речь детектится заметно лучше
  vad_start_rms: 0.0075         # Баланс: не ловить фоновый шум как начало речи
  vad_hold_rms: 0.0052          # Не держать фразу на комнатном шуме
  vad_floor_rms: 0.0012         # Отсечка совсем тихого фона для вызова VAD
  rms_bridge_ms: 96             # Короткий мост между слогами, без заметного роста TTFT
  min_silence_ms: 420           # Быстрее закрытие фразы без заметной обрезки хвоста
  min_speech_ms: 220            # Немного мягче минималка для тихой речи
  pre_roll_ms: 300              # ПАМЯТЬ: сколько мс тишины хранить перед фразой
  resample_mode: "polyphase"    # Качественный ресемпл 48k->16k (лучше для VAD/STT)
  mic_gain_db: 10.0             # Чуть мягче усиление: меньше подъёма фонового шума
  agc_enable: true              # Простая AGC под тихую речь
  agc_target_rms: 0.032         # Более консервативный AGC (меньше «накачки» шума)
  agc_max_gain_db: 9.0          # Жёстче ограничиваем AGC для стабильной сегментации
  soft_limit: 0.97              # Лимитер от клиппинга
  voice_merge_window_ms: 2200   # Окно склейки соседних STT-сегментов в один пользовательский ход
  response_debounce_ms: 250     # Отложенный автозапуск RESPONSE для склейки близких VAD-сегментов
  response_min_quiet_ms_after_speech_start: 350  # Не запускать response, пока не прошло короткое "окно тишины" после speech_start
  speech_start_min_interval_ms: 900  # Анти-спам для /speech_start
  speech_start_confirm_ms: 140  # Раньше подтверждаем старт речи на тихом голосе
  min_speech_ms_interrupt: 100  # Короткие команды перебивания не отбрасывать
  speech_start_interrupt_mode: "soft"  # soft|hard: мягкий режим не прерывает активный response только по старту голоса
  turn_merge_window_ms: 2200    # Окно повторного использования turn_id на стороне микрофонного клиента
  stt_immediate_max_active: 2   # Максимум параллельных immediate STT-воркеров
  stt_immediate_max_pending: 8  # Максимум ожидающих audio-сегментов
  stt_backpressure_policy: "drop_oldest" # drop_oldest | drop_latest | merge_latest
  stt_status_cooldown_ms: 750   # Анти-флуд для STT системных WS-событий
  interrupt_speaker_policy: "same_or_unknown"  # any | same_only | same_or_unknown
  # Wake-word tuning for common STT misses. One-word utterances from these lists
  # trigger a response and are normalized to character_name in context.
  wake_words: ["нира", "нера", "nira"]
  wake_word_aliases: ["мира", "миру", "миром", "ниру", "нире", "нирой", "ниры", "нерра"]
  # Allow short emotional cues (laughs/hum) to still produce a response.
  respond_to_short_emotes: true
  short_emote_words: ["ха-ха", "хаха", "ахах", "ахаха", "хм", "гм", "лол", "ржу"]

  # TTS (Text-to-Speech) пока не подключен

# Prompter settings
prompter:
  instruction_prompt_filename: 'instruction.md'
  character_prompt_filename: 'nira.md'
  scene_prompt_filename: 'scene.md'
  character_name: "Нира"
  history_length: 50

# Llama.cpp Settings (RTX 5070 12GB)
llamacpp_filepath: "C:\\Nirmita\\bin\\llamacpp\\llama-server.exe"
llamacpp_model_filepath: "C:\\Nirmita\\models\\Mistral-Nemo-Instruct-2407-absolute-heresy.i1-Q4_K_M.gguf"
llamacpp_ctx: 8192
llamacpp_ngl: 40
llamacpp_cache_type_k: "q8_0" # Конфигурация 8-битного квантования контекста (K-cache)
llamacpp_cache_type_v: "q8_0" # Конфигурация 8-битного квантования контекста (V-cache)
llamacpp_gpu_id: 0 # Жесткая привязка к RTX 5070
llamacpp_extra_args: "--flash-attn on"

# FFmpeg (настроен в системе)
# ffmpeg_filepath: "C:\\Nirmita\\bin\\ffmpeg.exe"

# Spacy NLP
spacy_model: en_core_web_sm
