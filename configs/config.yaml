# Enabled operations
stt_active_id: "sherpa"  # Быстрое переключение STT: выбери id и вызови /api/operations/reload
broadcast_debug_prompt_events: false  # Служебные raw prompt/history события в WS (держать false для меньшей нагрузки)

operations:
  # STT (Speech-to-Text): текущий рабочий модуль — sherpa.
  - role: stt
    id: sherpa
    ws_url: "ws://localhost:6006"
    provider: "cpu"   # cpu | cuda
    gpu_id: 1          # используется если provider=cuda (у тебя RTX 5060 = 1)
    model_dir: "C:\\Nirmita\\models\\vosk-model-small-streaming-ru"
    model_variant: "fp32"   # int8 | fp32 | chunk64
    decoding_method: "modified_beam_search"
    num_active_paths: 6
    use_endpoint: 0
    hotwords_file: "C:\\Nirmita\\models\\hotwords.txt"
    hotwords_score: 3.5

  # T2T (Text-to-Text) - Используем внешний llama-server
  - role: t2t
    id: llamacpp
    max_length: 500
    temperature: 0.7
    top_p: 0.95
    top_k: 40
    stream: true

  # Запасной вариант (прямая библиотека)
  # - role: t2t
  #   id: llamacpp_python
  #   model_path: "C:\\Nirmita\\models\\Mistral-Nemo-Instruct-2407-absolute-heresy.i1-Q4_K_M.gguf"
  #   n_ctx: 4096
  #   n_gpu_layers: 99
  #   max_tokens: 500
  #   temperature: 0.7
  #   cache_type_k: "q8_0" 
  #   cache_type_v: "q8_0"
  #   gpu_id: 0

  # Text filters
  - role: filter_text
    id: filter_clean
  - role: filter_text
    id: chunker_sentence

# Microphone & VAD Settings
microphone:
  enabled: true
  device_name: "Fifine"         # Основной выбор по имени устройства (устойчив к смене ID)
  # device_hostapi: "WASAPI"    # Опционально: фильтр по hostapi для точного совпадения
  device_index: 7               # Fallback, если по имени устройство не найдено
  vad_threshold: 0.12           # Оптимально для пре-ролла и триггеров
  min_silence_ms: 400           # СТАБИЛЬНОСТЬ: быстрое завершение без дробления (оптимизировано)
  min_speech_ms: 250            # Исключаем ложные срабатывания
  pre_roll_ms: 300              # ПАМЯТЬ: сколько мс тишины хранить перед фразой
  voice_merge_window_ms: 2200   # Окно склейки соседних STT-сегментов в один пользовательский ход
  response_debounce_ms: 250     # Отложенный автозапуск RESPONSE для склейки близких VAD-сегментов
  response_min_quiet_ms_after_speech_start: 350  # Не запускать response, пока не прошло короткое "окно тишины" после speech_start
  speech_start_min_interval_ms: 900  # Анти-спам для /speech_start
  speech_start_confirm_ms: 180  # Быстрее подтверждаем старт речи, чтобы одно слово "стоп" успевало дойти
  min_speech_ms_interrupt: 120  # Короткие команды перебивания ("стоп"/"стой") не отбрасывать как слишком короткие
  speech_start_interrupt_mode: "soft"  # soft|hard: мягкий режим не прерывает активный response только по старту голоса
  # Wake-word tuning for common STT misses. One-word utterances from these lists
  # trigger a response and are normalized to character_name in context.
  wake_words: ["нира", "нера", "nira"]
  wake_word_aliases: ["мира", "миру", "миром", "ниру", "нире", "нирой", "ниры", "нерра"]
  # Allow short emotional cues (laughs/hum) to still produce a response.
  respond_to_short_emotes: true
  short_emote_words: ["ха-ха", "хаха", "ахах", "ахаха", "хм", "гм", "лол", "ржу"]

  # TTS (Text-to-Speech) пока не подключен

# Prompter settings
prompter:
  instruction_prompt_filename: 'instruction.md'
  character_prompt_filename: 'nira.md'
  scene_prompt_filename: 'scene.md'
  character_name: "Нира"
  history_length: 50

# Llama.cpp Settings (RTX 5070 12GB)
llamacpp_filepath: "C:\\Nirmita\\bin\\llamacpp\\llama-server.exe"
llamacpp_model_filepath: "C:\\Nirmita\\models\\Mistral-Nemo-Instruct-2407-absolute-heresy.i1-Q4_K_M.gguf"
llamacpp_ctx: 8192
llamacpp_ngl: 40
llamacpp_cache_type_k: "q8_0" # Конфигурация 8-битного квантования контекста (K-cache)
llamacpp_cache_type_v: "q8_0" # Конфигурация 8-битного квантования контекста (V-cache)
llamacpp_gpu_id: 0 # Жесткая привязка к RTX 5070
llamacpp_extra_args: "--flash-attn on"

# FFmpeg (настроен в системе)
# ffmpeg_filepath: "C:\\Nirmita\\bin\\ffmpeg.exe"

# Spacy NLP
spacy_model: en_core_web_sm
